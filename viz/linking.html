<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Linking matrix of primes — Stage 1</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <header>
    <h1>The linking matrix of primes</h1>
    <p class="subtitle">Stage 1 — (p/q) = (−1)<sup>lk₂(p,q)</sup> over primes ≡ 1 (mod 4). Renders emitted JSON only.</p>
  </header>
  <div id="err" class="error" hidden></div>
  <main>
    <section class="panel">
      <h2>Linking heatmap</h2>
      <div id="heatmap"></div>
      <div class="legend">
        <span><span class="swatch" style="background:var(--linked)"></span>linked (symbol −1)</span>
        <span><span class="swatch" style="background:var(--unlinked)"></span>unlinked (symbol +1)</span>
      </div>
      <div class="params" id="matrix-params"></div>
    </section>
    <section class="panel">
      <h2>Linking graph (force layout)</h2>
      <div id="graph"></div>
      <div class="params" id="graph-params"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const fail = (msg) => {
      const e = document.getElementById("err");
      e.hidden = false;
      e.textContent = "Could not load data: " + msg +
        "  —  emit it and serve the folder:  ./build/bin/at emit --stage 1 --out viz/data  &&  python3 -m http.server -d viz";
    };

    // base64 -> Uint8Array of bits (column j is bit j%8 of byte j/8).
    function decodeRow(b64, n) {
      const bin = atob(b64);
      const bits = new Uint8Array(n);
      for (let j = 0; j < n; j++) bits[j] = (bin.charCodeAt(j >> 3) >> (j & 7)) & 1;
      return bits;
    }

    const showParams = (id, obj) =>
      document.getElementById(id).textContent =
        "schema: " + obj.schema + "\ngenerated_by: " + obj.generated_by +
        "\nparams: " + JSON.stringify(obj.params) +
        (obj.stats ? "\nstats: " + JSON.stringify(obj.stats) : "");

    function drawHeatmap(m) {
      const n = m.n;
      const rows = m.rows_base64.map((r) => decodeRow(r, n));
      const cell = Math.max(2, Math.min(9, Math.floor(560 / Math.max(n, 1))));
      const pad = 1;
      const size = n * cell;
      const svg = d3.select("#heatmap").append("svg")
        .attr("width", size + pad * 2).attr("height", size + pad * 2);
      const g = svg.append("g").attr("transform", `translate(${pad},${pad})`);
      // Draw only the set (linked) cells over a light background grid.
      g.append("rect").attr("width", size).attr("height", size)
        .attr("fill", "var(--unlinked)");
      const linked = [];
      for (let i = 0; i < n; i++)
        for (let j = 0; j < n; j++)
          if (rows[i][j]) linked.push([i, j]);
      g.selectAll("rect.cell").data(linked).enter().append("rect")
        .attr("class", "cell")
        .attr("x", (d) => d[1] * cell).attr("y", (d) => d[0] * cell)
        .attr("width", cell - (cell > 3 ? 0.4 : 0))
        .attr("height", cell - (cell > 3 ? 0.4 : 0))
        .attr("fill", "var(--linked)")
        .append("title").text((d) => `(${m.primes[d[0]]}, ${m.primes[d[1]]}) linked`);
      showParams("matrix-params", m);
    }

    function drawGraph(gdata) {
      const width = 560, height = 560;
      const nodes = gdata.nodes.map((d) => ({ ...d }));
      const links = gdata.edges.map((d) => ({ source: d.source, target: d.target }));
      const svg = d3.select("#graph").append("svg")
        .attr("width", width).attr("height", height);
      const maxDeg = d3.max(nodes, (d) => d.degree) || 1;
      const color = d3.scaleSequential(d3.interpolateViridis).domain([0, maxDeg]);

      const link = svg.append("g").selectAll("line").data(links).enter()
        .append("line").attr("class", "link");
      const node = svg.append("g").selectAll("g").data(nodes).enter()
        .append("g").attr("class", "node");
      node.append("circle").attr("r", 6).attr("fill", (d) => color(d.degree))
        .append("title").text((d) => `p=${d.prime}, degree=${d.degree}`);
      node.append("text").attr("dx", 8).attr("dy", 3).text((d) => d.prime);

      const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).distance(40).strength(0.15))
        .force("charge", d3.forceManyBody().strength(-60))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collide", d3.forceCollide(10));
      sim.on("tick", () => {
        link.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
        node.attr("transform", (d) =>
          `translate(${(d.x = Math.max(10, Math.min(width - 10, d.x)))},${(d.y = Math.max(10, Math.min(height - 10, d.y)))})`);
      });
      showParams("graph-params", gdata);
    }

    Promise.all([
      fetch("data/linking_matrix.json").then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch("data/linking_graph.json").then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    ]).then(([m, g]) => { drawHeatmap(m); drawGraph(g); }).catch((e) => fail(e.message));
  </script>
</body>
</html>
