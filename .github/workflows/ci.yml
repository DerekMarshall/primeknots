name: CI

# Builds the from-scratch C++20 suite and runs the ORACLE-LESS subset. The oracle
# tests (PARI/GP, the Odlyzko table, the Belabas binary, LMFDB) are intentionally
# NOT provisioned here: they SKIP visibly (exit 77 → ctest "Skipped"), exactly as
# designed (CLAUDE.md #3 / ARCHITECTURE §4). A missing oracle is a warning, never
# a failure; a real bug in a non-oracle test fails the build.

# Run on EVERY branch push, not just main: the murmurations M-ladder lives on a
# feature branch, and "push on green at my judgment" is only meaningful if a branch
# push actually runs CI (the second-environment referee). Until 2026-07-10 the branch
# was CI'd only by manual `gh workflow run` (the "manual-dispatch era"), which let
# latent portability + determinism bugs sit unrefereed — ERRATA #21/#22/#23.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build python3-venv
          # Modern jsonschema in a gitignored .venv (matches the local setup, and is
          # PEP 668-safe: `pip install --user` is blocked on ubuntu 24.04, and the apt
          # `python3-jsonschema` is too old for draft-2020-12 — it raised a
          # RefResolutionError, ERRATA #23). CMake's AT_VALIDATE_PY prefers .venv, so
          # validate-json + freshness run with this interpreter.
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade jsonschema

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Smoke tests (fast subset — prove the core is not broken, not a full algorithm run)
        # CI is a SMOKE check, not the full verification suite (which runs on the box). Run a fast
        # foundational subset only: core arithmetic (stage0), reciprocity/symbols (stage1), Rédei
        # (stage2), a_p (m0), and the SS density/empirical units (m4). The heavy M-stage statistic
        # builds (m2 Dirichlet, m3 Zubrilina, m5 partials), classgroup/zeta/DW (stage3/5/6),
        # murmuration curve (m1), and the ~1–2 h m0b gate (heavy) are NOT run in CI — a 2-core
        # runner takes far too long and hammers Actions. The build (above) proves they all COMPILE,
        # and the freshness step (below) re-emits every stage's JSON to catch emitter drift.
        run: ctest --test-dir build -L '^(stage0|stage1|stage2|m0|m4)$' --output-on-failure --no-tests=error

      - name: Freshness — committed viz/data snapshot == `at emit` at HEAD
        # CI verifies exactly what GitHub Pages serves; drift (an emitter changed
        # without a re-emit) is a build failure. generated_by is normalized.
        run: ctest --test-dir build -L freshness --output-on-failure

      - name: List the oracle tests (these are the ones expected to SKIP)
        if: always()
        run: ctest --test-dir build -N -L oracle
